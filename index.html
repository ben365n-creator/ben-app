.fix-tracker.show{display:block;}
.ft-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}

.ft-dot.done{background:var(--green);border-color:var(--green);}
.ft-dot.active{background:var(--orange);border-color:var(--orange);}
.pfix{margin:10px 12px 0;display:none;}
.pfix.show{display:block;}

.pfix-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}

.pfix-lbl::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--blue);display:inline-block;}
.pfix-check{width:22px;height:22px;border-radius:6px;border:1.5px solid rgba(0,176,255,.4);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .2s;}
.pfix-check.done{background:var(--green);border-color:var(--green);}
.pfix-block{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;}
.pfix-txt{font-size:13px;color:#c5c5d8;line-height:1.5;}
.pfix-rollover{font-size:10px;color:var(--orange);margin-top:5px;display:none;}
.pfix-rollover.show{display:block;}
.sec-tag{padding:16px 18px 6px;font-size:9px;letter-spacing:.25em;color:var(--dim);text-transform:uppercase;font-weight:600;}
.block{margin:0 12px 8px;background:rgba(14,14,26,.75);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color .3s;backdrop-filter:blur(6px);}
.block.complete{border-color:#00e67628;}
.blk-head{display:flex;align-items:center;gap:12px;padding:14px;cursor:pointer;}
.blk-num{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--muted);min-width:18px;}
.blk-info{flex:1;}
.blk-name{font-size:14px;font-weight:600;}
.blk-sub{font-size:11px;color:var(--dim);margin-top:2px;}
.blk-hint{font-size:10px;color:var(--blue);margin-top:4px;opacity:.75;font-style:italic;display:none;}
.blk-hint.show{display:block;}
.blk-pts{font-family:'DM Mono',monospace;font-size:11px;color:var(--dim);}
.blk-pts.lit{color:var(--green);}
.blk-bar{height:2px;background:var(--border);margin:0 14px;}
.blk-bar-fill{height:100%;background:var(--green);transition:width .4s;border-radius:2px;}
.tasks{padding:6px 0 12px;}
.task{display:flex;align-items:center;gap:12px;padding:10px 14px;cursor:pointer;-webkit-user-select:none;user-select:none;}
.task:active{background:rgba(255,255,255,.03);}
.chk{width:21px;height:21px;border-radius:6px;border:1.5px solid var(--b2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:12px;}
.chk.on{background:var(--green);border-color:var(--green);color:#000;font-weight:700;}
.tn{flex:1;font-size:13px;color:#aaa;}
.tn.on{color:var(--muted);text-decoration:line-through;opacity:0.7;}
.tpts{font-family:'DM Mono',monospace;font-size:11px;color:var(--green);}
