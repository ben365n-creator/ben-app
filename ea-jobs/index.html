<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EA Jobs">
  <meta name="theme-color" content="#1b4332">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>EA Jobs</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
      background: #f9fafb;
      color: #111827;
      min-height: 100vh;
      padding-bottom: 64px;
    }
    header {
      background: #1b4332;
      color: #fff;
      padding: 20px 24px 16px;
      text-align: center;
    }
    header h1 { font-size: 22px; font-weight: 700; letter-spacing: 0.3px; }
    header p  { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 4px; }

    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 58px;
      background: #fff;
      border-top: 1px solid #e5e7eb;
      display: flex;
      z-index: 100;
    }
    .nav-btn {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 14px;
      font-weight: 600;
      color: #9ca3af;
      cursor: pointer;
      -webkit-appearance: none;
      transition: color 0.15s;
      padding-bottom: 4px;
    }
    .nav-btn.active {
      color: #1b4332;
      border-top: 2.5px solid #1b4332;
    }

    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    main {
      max-width: 480px;
      margin: 0 auto;
      padding: 20px 16px 24px;
    }
    .card {
      background: #fff;
      border-radius: 14px;
      padding: 22px 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      margin-bottom: 14px;
    }
    .field { margin-bottom: 20px; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 7px;
    }
    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 14px 13px;
      font-size: 17px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      outline: none;
      background: #fff;
      color: #111827;
      -webkit-appearance: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #1b4332; }

    .pnl-card {
      background: #f0fdf4;
      border: 1.5px solid #bbf7d0;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 20px;
      font-size: 14px;
    }
    .pnl-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 3px 0;
    }
    .pnl-label { color: #6b7280; font-weight: 500; }
    .pnl-value { color: #111827; font-weight: 600; font-size: 14px; }
    .pnl-divider { border-top: 1px solid #bbf7d0; margin: 8px 0; }
    .pnl-profit .pnl-label { color: #1b4332; font-weight: 700; }
    .pnl-profit .pnl-value { color: #1b4332; font-weight: 700; font-size: 16px; }
    .pnl-crew-val { color: #1b4332; font-weight: 700; font-size: 15px; }

    .btn-row { display: flex; gap: 10px; margin-bottom: 16px; }
    .btn-outline {
      flex: 1;
      background: transparent;
      color: #1b4332;
      border: 2px solid #1b4332;
      border-radius: 12px;
      padding: 15px 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      -webkit-appearance: none;
      transition: background 0.15s;
    }
    .btn-outline:active { background: #f0fdf4; }
    .btn-outline:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-solid {
      flex: 1;
      background: #1b4332;
      color: #fff;
      border: 2px solid #1b4332;
      border-radius: 12px;
      padding: 15px 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      -webkit-appearance: none;
      transition: background 0.15s;
    }
    .btn-solid:active { background: #0f2d1a; }
    .btn-solid:disabled { opacity: 0.4; cursor: not-allowed; }

    .test-mode-row {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      background: #fefce8;
      border: 1px solid #fde68a;
      border-radius: 8px;
    }
    .test-mode-row label {
      font-size: 12px;
      font-weight: 600;
      color: #92400e;
      text-transform: none;
      letter-spacing: 0;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .test-mode-row input[type="checkbox"] {
      width: 18px; height: 18px;
      accent-color: #1b4332;
      cursor: pointer;
      flex-shrink: 0;
    }

    .error-box {
      background: #fef2f2;
      border: 1.5px solid #fca5a5;
      border-radius: 10px;
      color: #b91c1c;
      padding: 12px 14px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }

    #success-screen { text-align: center; }
    .check-wrap {
      width: 80px; height: 80px;
      background: #1b4332;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }
    .check-wrap svg { width: 44px; height: 44px; }
    #success-screen h2 { font-size: 24px; font-weight: 700; color: #1b4332; margin-bottom: 8px; }
    #success-screen p  { font-size: 15px; color: #6b7280; line-height: 1.6; margin-bottom: 26px; }
    .btn-reset {
      background: transparent;
      border: 2px solid #1b4332;
      color: #1b4332;
      border-radius: 12px;
      padding: 13px 32px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      -webkit-appearance: none;
    }

    .week-header {
      font-size: 13px;
      font-weight: 700;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
    .week-job-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #f3f4f6;
      font-size: 15px;
    }
    .week-job-row:last-child { border-bottom: none; }
    .week-job-name { font-weight: 600; color: #111827; }
    .week-job-profit { font-weight: 700; color: #1b4332; }
    .week-totals {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 2px solid #e5e7eb;
    }
    .week-total-row {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      font-size: 15px;
      font-weight: 700;
    }
    .week-total-label { color: #374151; }
    .week-total-val { color: #1b4332; }
    .week-empty { text-align: center; color: #9ca3af; font-size: 15px; padding: 30px 0; }
  </style>
</head>
<body>

  <header>
    <h1>EA Jobs</h1>
    <p>Exterior Arts Renovations</p>
  </header>

  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-close" onclick="switchTab('close')">Close Job</button>
    <button class="nav-btn" id="nav-week" onclick="switchTab('week')">This Week</button>
  </nav>

  <!-- Close Job Tab -->
  <div class="tab-pane active" id="tab-close">
    <main>
      <div id="form-screen">
        <div class="card">
          <div class="error-box" id="error-box"></div>

          <div class="field">
            <label for="jobName">Job Name</label>
            <input type="text" id="jobName" placeholder="Enter job name…" autocomplete="off">
          </div>

          <div class="field">
            <label for="materialsCost">Total Materials Cost ($)</label>
            <input type="number" id="materialsCost" min="0" step="0.01" placeholder="0.00">
          </div>

          <div class="pnl-card">
            <div class="pnl-row">
              <span class="pnl-label">Job</span>
              <span class="pnl-value" id="pnl-job">—</span>
            </div>
            <div class="pnl-row">
              <span class="pnl-label">Bid</span>
              <span class="pnl-value" id="pnl-bid">—</span>
            </div>
            <div class="pnl-row">
              <span class="pnl-label">Materials</span>
              <span class="pnl-value" id="pnl-materials">—</span>
            </div>
            <div class="pnl-divider"></div>
            <div class="pnl-row pnl-profit">
              <span class="pnl-label">Profit</span>
              <span class="pnl-value" id="pnl-profit">—</span>
            </div>
            <div class="pnl-row">
              <span class="pnl-label">Crew Leader Pay</span>
              <span class="pnl-value pnl-crew-val" id="pnl-crew">—</span>
            </div>
          </div>

          <div class="btn-row">
            <button id="saveBtn" class="btn-outline" onclick="handleSave(false)">Save Job</button>
            <button id="smsBtn" class="btn-solid" onclick="handleSave(true)">Save + Send SMS ✓</button>
          </div>

          <div class="test-mode-row">
            <label>
              <input type="checkbox" id="testMode">
              Test Mode — SMS goes to Ben only
            </label>
          </div>
        </div>
      </div>

      <div id="success-screen" class="card" style="display:none;">
        <div class="check-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="white"
               stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <h2 id="success-title">Done!</h2>
        <p id="success-msg">Job saved successfully.</p>
        <button class="btn-reset" onclick="resetForm()">Close Another Job</button>
      </div>
    </main>
  </div>

  <!-- This Week Tab -->
  <div class="tab-pane" id="tab-week">
    <main>
      <div class="card">
        <div class="week-header" id="week-header">This Week</div>
        <div id="week-list"></div>
        <div class="week-totals" id="week-totals" style="display:none;">
          <div class="week-total-row">
            <span class="week-total-label">Total Profit</span>
            <span class="week-total-val" id="week-total-profit">$0.00</span>
          </div>
          <div class="week-total-row">
            <span class="week-total-label">Crew Leader Pay</span>
            <span class="week-total-val" id="week-total-crew">$0.00</span>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const GET_JOBS_URL = 'https://hook.us2.make.com/zvg1lf2a8on7fqgknnj3w9xfe19wfjtg';
    const SUBMIT_URL   = 'https://hook.us2.make.com/ca893d4gs5uyf0nhaxspy3d9njlmsl9w';

    let jobsData = {};
    let allRows  = [];

    async function loadJobs() {
      try {
        const resp = await fetch(GET_JOBS_URL);
        if (!resp.ok) return;
        const rows = await resp.json();
        allRows = rows;
        jobsData = {};
        rows.forEach(r => {
          const name = String(r['Job Name'] || '').trim();
          const bid  = parseFloat(r['Bid Amount']) || 0;
          if (name) jobsData[name] = bid;
        });
      } catch(e) { /* silent */ }
    }

    function recalc() {
      const name = document.getElementById('jobName').value.trim();
      const cost = parseFloat(document.getElementById('materialsCost').value) || 0;
      document.getElementById('pnl-job').textContent = name || '—';
      const bid = jobsData[name];
      if (bid !== undefined && bid > 0) {
        const profit  = bid - cost;
        const margin  = ((profit / bid) * 100).toFixed(1);
        const crewPay = Math.max(0, profit) * 0.15;
        document.getElementById('pnl-bid').textContent      = '$' + bid.toFixed(2);
        document.getElementById('pnl-materials').textContent = cost > 0 ? '-$' + cost.toFixed(2) : '$0.00';
        document.getElementById('pnl-profit').textContent   = '$' + profit.toFixed(2) + ' (' + margin + '%)';
        document.getElementById('pnl-crew').textContent     = '$' + crewPay.toFixed(2);
      } else {
        document.getElementById('pnl-bid').textContent      = '—';
        document.getElementById('pnl-materials').textContent = cost > 0 ? '-$' + cost.toFixed(2) : '—';
        document.getElementById('pnl-profit').textContent   = '—';
        document.getElementById('pnl-crew').textContent     = '—';
      }
    }

    document.getElementById('jobName').addEventListener('input', recalc);
    document.getElementById('materialsCost').addEventListener('input', recalc);

    function showError(msg) {
      const el = document.getElementById('error-box');
      el.textContent = msg; el.style.display = 'block';
    }
    function clearError() {
      const el = document.getElementById('error-box');
      el.textContent = ''; el.style.display = 'none';
    }

    async function handleSave(sendSMS) {
      clearError();
      const jobName       = document.getElementById('jobName').value.trim();
      const materialsCost = parseFloat(document.getElementById('materialsCost').value);
      const testMode      = document.getElementById('testMode').checked;

      if (!jobName) { showError('Please enter a job name.'); return; }
      if (isNaN(materialsCost) || materialsCost < 0) {
        showError('Please enter a valid materials cost (0 is fine).');
        return;
      }

      const saveBtn = document.getElementById('saveBtn');
      const smsBtn  = document.getElementById('smsBtn');
      saveBtn.disabled = smsBtn.disabled = true;
      if (sendSMS) smsBtn.textContent = 'Sending…';
      else saveBtn.textContent = 'Saving…';

      try {
        const today   = new Date().toISOString().split('T')[0];
        const bid     = jobsData[jobName] || 0;
        const profit  = bid > 0 ? bid - materialsCost : 0;
        const crewPay = Math.max(0, profit) * 0.15;

        const resp = await fetch(SUBMIT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ jobName, materialsCost, bidAmount: bid, profit, crewPay, closeDate: today, sendSMS, testMode })
        });
        if (!resp.ok) throw new Error('Server error ' + resp.status);

        document.getElementById('success-title').textContent =
          sendSMS ? 'Saved + SMS sent!' : 'Job Saved';
        document.getElementById('success-msg').innerHTML = sendSMS
          ? (testMode ? 'Job saved. Test SMS sent to Ben.' : 'Job saved. Andrew and Trish will receive a text shortly.')
          : 'Job saved to the sheet. No SMS sent.';

        document.getElementById('form-screen').style.display  = 'none';
        document.getElementById('success-screen').style.display = 'block';
        loadJobs();
      } catch(e) {
        showError('Submission failed — please try again or contact Ben.');
        saveBtn.disabled = smsBtn.disabled = false;
        saveBtn.textContent = 'Save Job';
        smsBtn.textContent  = 'Save + Send SMS ✓';
      }
    }

    function resetForm() {
      document.getElementById('jobName').value = '';
      document.getElementById('materialsCost').value = '';
      document.getElementById('testMode').checked = false;
      document.getElementById('saveBtn').textContent = 'Save Job';
      document.getElementById('smsBtn').textContent  = 'Save + Send SMS ✓';
      recalc(); clearError();
      document.getElementById('success-screen').style.display = 'none';
      document.getElementById('form-screen').style.display    = 'block';
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      document.getElementById('nav-' + tab).classList.add('active');
      if (tab === 'week') renderThisWeek();
    }

    function getWeekBounds() {
      const now = new Date();
      const day = now.getDay();
      const diffToMon = (day === 0) ? -6 : 1 - day;
      const mon = new Date(now);
      mon.setDate(now.getDate() + diffToMon);
      mon.setHours(0, 0, 0, 0);
      const sun = new Date(mon);
      sun.setDate(mon.getDate() + 6);
      sun.setHours(23, 59, 59, 999);
      return { mon, sun };
    }

    function renderThisWeek() {
      const listEl   = document.getElementById('week-list');
      const totalsEl = document.getElementById('week-totals');
      const headerEl = document.getElementById('week-header');
      const { mon, sun } = getWeekBounds();
      const fmt = d => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      headerEl.textContent = 'This Week (' + fmt(mon) + ' – ' + fmt(sun) + ')';

      const weekJobs = allRows.filter(r => {
        if ((r['Status'] || '').trim().toLowerCase() !== 'paid') return false;
        const cd = r['Invoice Paid Date'] || r['Close Date'] || r['close_date'] || '';
        if (!cd) return false;
        const d = new Date(cd + 'T12:00:00');
        return d >= mon && d <= sun;
      });

      listEl.innerHTML = '';
      totalsEl.style.display = 'none';

      if (weekJobs.length === 0) {
        listEl.innerHTML = '<div class="week-empty">No jobs closed this week yet.</div>';
        return;
      }

      let totalProfit = 0;
      weekJobs.forEach((r, i) => {
        const name      = String(r['Job Name'] || '').trim();
        const bid       = parseFloat(r['Bid Amount']) || 0;
        const materials = parseFloat(r['Jobber Costs'] || r['Materials'] || 0);
        const profit    = bid > 0 ? bid - materials : 0;
        totalProfit += profit;
        const row = document.createElement('div');
        row.className = 'week-job-row';
        row.innerHTML =
          '<span class="week-job-name">' + (i + 1) + '. ' + esc(name) + '</span>' +
          '<span class="week-job-profit">$' + profit.toFixed(2) + '</span>';
        listEl.appendChild(row);
      });

      const crew = Math.max(0, totalProfit) * 0.15;
      document.getElementById('week-total-profit').textContent = '$' + totalProfit.toFixed(2);
      document.getElementById('week-total-crew').textContent   = '$' + crew.toFixed(2);
      totalsEl.style.display = 'block';
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js', { scope: './' }).catch(() => {});
      });
    }

    loadJobs();
  </script>
</body>
</html>
